<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AIO-FUSEBOX VISION</title>
    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --header-h: 52px;
      --bottom-h: 140px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
 
    /* küçük telefon (< 380px) */
    @media (max-height: 650px) {
      :root { --bottom-h: 130px; }
    }
    /* büyük telefon / tablet (> 850px) */
    @media (min-height: 850px) {
      :root { --bottom-h: 160px; }
    }
 
    html, body {
      height: 100%;
      height: 100dvh;
    }
 
    body {
      background: #0d0d0f;
      color: #f0f0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
 
    /* ── HEADER ─────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      padding-top: var(--safe-top);
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: calc(var(--header-h) + var(--safe-top));
      z-index: 100;
      backdrop-filter: blur(10px);
    }
 
    #header h1 {
      font-size: clamp(0.8rem, 3.5vw, 1rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }
 
    #status-text {
      margin-left: auto;
      font-size: clamp(0.7rem, 2.8vw, 0.82rem);
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 55%;
      text-align: right;
    }
 
    /* ── VIEWPORT ────────────────────────────── */
    #viewport {
      position: fixed;
      top: calc(var(--header-h) + var(--safe-top));
      left: 0;
      right: 0;
      bottom: calc(var(--bottom-h) + var(--safe-bottom));
      background: #000;
      overflow: hidden;
    }
 
    #video, #snapshot {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #snapshot { display: none; }
 
    #canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
 
    /* ── LOADING OVERLAY ─────────────────────── */
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(13,13,15,0.88);
      backdrop-filter: blur(8px);
      z-index: 20;
      gap: 16px;
      transition: opacity 0.4s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
 
    .spinner {
      width: clamp(36px, 10vw, 52px);
      height: clamp(36px, 10vw, 52px);
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
 
    #loading-message {
      font-size: clamp(0.8rem, 3.5vw, 0.95rem);
      color: #94a3b8;
      text-align: center;
      padding: 0 24px;
    }
 
    /* ── BOTTOM BAR ──────────────────────────── */
    #bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: calc(var(--bottom-h) + var(--safe-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      padding-bottom: calc(10px + var(--safe-bottom));
      gap: clamp(5px, 1.5vh, 10px);
      background: rgba(0,0,0,0.85);
      border-top: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(10px);
      transition: background 0.25s, border-top-color 0.25s;
      z-index: 100;
    }
 
    #bottom-bar.ok  { background: rgba(22,163,74,0.22);  border-top-color: rgba(34,197,94,0.35); }
    #bottom-bar.nok { background: rgba(185,28,28,0.22);  border-top-color: rgba(239,68,68,0.35); }
 
    #result-label {
      font-size: clamp(1.6rem, 8vw, 2.8rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      line-height: 1;
      color: #64748b;
      text-shadow: 0 0 30px currentColor;
      min-height: 1.1em;
      transition: color 0.25s;
    }
    #bottom-bar.ok  #result-label { color: #4ade80; }
    #bottom-bar.nok #result-label { color: #f87171; }
 
    #detected-ids {
      font-family: monospace;   
      white-space: pre;   
      font-size: clamp(0.68rem, 2.8vw, 0.78rem);
      color: #94a3b8;
      min-height: 1em;
      text-align: center;
      padding: 0 8px;
    }

    /* amp renk sınıfları */
    .amp-empty { color: #3f3f46 !important; }
    .amp-2     { color: #a78bfa !important; }
    .amp-5     { color: #fb923c !important; }
    .amp-75    { color: #fca5a5 !important; }
    .amp-10    { color: #f87171 !important; }
    .amp-15    { color: #60a5fa !important; }
    .amp-20    { color: #facc15 !important; }
    .amp-25    { color: #4ade80 !important; }
    .amp-30    { color: #34d399 !important; }
    .amp-none  { color: #374151 !important; }
 
    /* ── BUTTONS ─────────────────────────────── */
    .btn {
      width: 100%;
      padding: clamp(10px, 2.5vw, 14px);
      border: none;
      border-radius: 14px;
      font-size: clamp(0.85rem, 3.8vw, 1rem);
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.15s, transform 0.1s;
      touch-action: manipulation;
    }
    .btn:active { opacity: 0.72; transform: scale(0.97); }
    .btn-primary   { background: #6366f1; color: #fff; }
    .btn-success   { background: #22c55e; color: #fff; }
    .btn-secondary { background: rgba(255,255,255,0.12); color: #fff; }
    .btn:disabled  { opacity: 0.3; cursor: not-allowed; }
 
    .btn-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }
 
    .hidden { display: none !important; }

    /* ── DRAWER ──────────────────────────────── */
    #detected-ids {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      max-height: 72vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: rgba(8,8,12,0.97);
      color: #fff;
      z-index: 50;
      padding: 0 8px 24px;
      border-radius: 18px 18px 0 0;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
      font-size: 13px;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.6);
    }
    #detected-ids.drawer-open {
      transform: translateY(0);
    }

    #drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 49;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #drawer-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer-handle {
      width: 44px; height: 4px;
      background: #3f3f50;
      border-radius: 2px;
      margin: 12px auto 10px;
    }

    #btn-drawer {
      display: none;
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      letter-spacing: 0.02em;
      -webkit-appearance: none;
      appearance: none;
      transition: background 0.2s, color 0.2s;
    }
    #btn-drawer.visible {
      display: block;
    }
    #btn-drawer:active {
      background: rgba(255,255,255,0.2);
      color: #e2e8f0;
    }

    /* ── DRAWER TABLE ────────────────────────── */
    #detected-ids table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: clamp(0.72rem, 3vw, 0.82rem);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #detected-ids thead th {
      padding: 6px 8px;
      border-bottom: 2px solid rgba(255,255,255,0.10);
      color: #64748b;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: center;
    }
    #detected-ids tbody td     { padding: 5px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    #detected-ids tbody td.lbl { text-align: right; color: #475569; font-weight: 700; font-size: 0.7rem; padding-right: 4px; width: 38px; }
    #detected-ids tbody td.val { font-weight: 600; padding-left: 8px; }
    #detected-ids tbody td.sep { width: 10px; border-bottom: 1px solid rgba(0,0,0,0.4); background: rgba(255,255,255,0.02); }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js"
  onerror="document.getElementById('loading-message').textContent='ORT yüklenemedi!'">
</script>
</head>

<body>
  <div id="header">
    <h1>AIO-FUSEBOX VISION</h1>
    <span id="status-text">Yükleniyor…</span>
  </div>

  <div id="viewport">
    <video id="video" autoplay playsinline muted></video>
    <img id="snapshot" />
    <canvas id="canvas"></canvas>
    <div id="loading-overlay">
      <div class="spinner"></div>
      <span id="loading-message">Model yükleniyor…</span>
    </div>
  </div>



  <div id="bottom-bar">
    <div id="result-label"></div>
    <div id="detected-ids"></div>
    <button class="btn btn-primary" id="btn-capture">📷 Fotoğraf Çek</button>
    <div class="btn-row">
      <button class="btn btn-success hidden" id="btn-match">🔍 Eşleştir</button>
      <button class="btn btn-secondary hidden" id="btn-retake">🔄 Tekrar</button>
    </div>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
