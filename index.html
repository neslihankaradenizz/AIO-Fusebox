<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FuseBox Vision</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0f;
      color: #f0f0f0;
      font-family: sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 52px;
    }
    #header h1 { font-size: 0.95rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    #status-text { margin-left: auto; font-size: 0.78rem; color: #64748b; }

    #viewport {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      bottom: 200px; /* bottom-bar yüksekliği */
      background: #000;
      overflow: hidden;
    }

    #video, #snapshot {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #snapshot { display: none; }

    #canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(13,13,15,0.88);
      backdrop-filter: blur(6px);
      z-index: 20;
      gap: 16px;
      transition: opacity 0.4s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-message { font-size: 0.9rem; color: #94a3b8; }

    #bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 18px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      gap: 8px;
      background: rgba(0,0,0,0.85);
      border-top: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(10px);
      transition: background 0.25s;
      z-index: 100;
    }
    #bottom-bar.ok  { background: rgba(22,163,74,0.22); border-top-color: rgba(34,197,94,0.35); }
    #bottom-bar.nok { background: rgba(185,28,28,0.22); border-top-color: rgba(239,68,68,0.35); }

    #result-label {
      font-size: clamp(1.8rem, 6vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      line-height: 1;
      color: #64748b;
      text-shadow: 0 0 30px currentColor;
      min-height: 1.2em;
    }
    #bottom-bar.ok  #result-label { color: #4ade80; }
    #bottom-bar.nok #result-label { color: #f87171; }

    #detected-ids { font-size: 0.75rem; color: #94a3b8; min-height: 1em; }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.7; }
    .btn-primary   { background: #6366f1; color: #fff; }
    .btn-success   { background: #22c55e; color: #fff; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
    .btn:disabled  { opacity: 0.3; cursor: not-allowed; }
    .hidden { display: none !important; }

    .btn-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.all.min.js"
  onerror="document.getElementById('loading-message').textContent='ORT yüklenemedi!'">
</script>
</head>

<body>
  <div id="header">
    <h1>FuseBox Vision</h1>
    <span id="status-text">Yükleniyor…</span>
  </div>

  <div id="viewport">
    <video id="video" autoplay playsinline muted></video>
    <img id="snapshot" />
    <canvas id="canvas"></canvas>
    <div id="loading-overlay">
      <div class="spinner"></div>
      <span id="loading-message">Model yükleniyor…</span>
    </div>
  </div>

  <div id="bottom-bar">
    <div id="result-label"></div>
    <div id="detected-ids"></div>
    <button class="btn btn-primary" id="btn-capture">📷 Fotoğraf Çek</button>
    <div class="btn-row">
      <button class="btn btn-success hidden" id="btn-match">🔍 Eşleştir</button>
      <button class="btn btn-secondary hidden" id="btn-retake">🔄 Tekrar</button>
    </div>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
